name: Kali-Linux-Terminal

on:
  workflow_dispatch:
  schedule:
    # 00:00 مصر = 21:00 UTC (اليوم السابق)
    - cron: '0 21 * * *'
    # 06:00 مصر = 03:00 UTC
    - cron: '0 3 * * *'
    # 12:00 مصر = 09:00 UTC
    - cron: '0 9 * * *'
    # 18:00 مصر = 15:00 UTC
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: تشغيل حاوية Kali Terminal (بدون واجهة رسومية)
      run: |
        docker run -d \
          --name=kali-terminal \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 7681:7681 \
          -e TZ=Africa/Cairo \
          kalilinux/kali-rolling:latest \
          sleep infinity
        sleep 15

    - name: تثبيت أدوات Kali الأساسية و ttyd
      run: |
        docker exec kali-terminal bash -c "apt-get update && apt-get install -y kali-linux-headless curl wget git net-tools nano && apt-get clean"
        docker exec kali-terminal bash -c "wget https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -O /usr/local/bin/ttyd && chmod +x /usr/local/bin/ttyd"

    - name: تشغيل خدمة ttyd الطرفية
      run: |
        docker exec -d kali-terminal bash -c "/usr/local/bin/ttyd --credential admin:kali --port 7681 --writable bash"
        sleep 5

    - name: تنزيل أداة Cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
        chmod +x cloudflared

    - name: إنشاء نفق TryCloudflare (رابط عام ومجاني)
      run: |
        echo "⏳ جاري إنشاء النفق إلى المنفذ 7681 عبر TryCloudflare..."
        ./cloudflared tunnel --url http://localhost:7681 2>&1 | tee cloudflared.log &
        sleep 15
        TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
        echo "🌐 رابط الوصول (بيئة طرفية): $TUNNEL_URL"
        echo "🔐 بيانات الدخول: admin / kali"

    - name: الإبقاء على الخدمة 5 ساعات و 55 دقيقة
      run: |
        echo "✅ الحاوية تعمل: 4 CPUs, 12GB RAM, ALL capabilities"
        for i in {1..71}; do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] النفق نشط - $((i*5)) دقيقة"
          sleep 300
        done

    - name: تنظيف الموارد
      if: always()
      run: |
        docker stop kali-terminal || true
        docker rm kali-terminal || true
        pkill -f cloudflared || true
        echo "✅ تم التنظيف."
