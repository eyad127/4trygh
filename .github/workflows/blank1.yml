        chmod 600 ~/.ssh/serveo_key

        # إعداد SSH multiplexing لدعم الجلسات المتعددة
        mkdir -p ~/.ssh/sockets
        cat >> ~/.ssh/config << EOF
        Host serveo.net
          ControlMaster auto
          ControlPath ~/.ssh/sockets/%r@%h-%p
          ControlPersist 10m
          ServerAliveInterval 30
          ServerAliveCountMax 3
          ExitOnForwardFailure yes
          StrictHostKeyChecking no
        EOF

