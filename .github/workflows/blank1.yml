        chmod 600 ~/.ssh/serveo_key
        
        ssh -tt -fN -i ~/.ssh/serveo_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=5 \
            -o ExitOnForwardFailure=yes \
            -o Compression=yes \
            -o Ciphers=aes128-ctr,aes192-ctr,aes256-ctr \
            -R kali-terminal:8080:localhost:8080 serveo.net

    - name: Keep Alive for 5 Hours and 55 Minutes (then 5 min break)
      run: |
        echo "✅ Kali Terminal (Web) يعمل بأقصى إمكانيات - لا واجهة رسومية"
        echo "🌐 رابط الدخول: http://kali-terminal.serveo.net"
        echo "🔐 اسم المستخدم: kali  /  كلمة المرور: password"
        echo "💻 افتح عدة نوافذ داخل المتصفح باستخدام tmux:"
        echo "   - Ctrl+b ثم c  : إنشاء نافذة جديدة"
        echo "   - Ctrl+b ثم n/p: التنقل بين النوافذ"
        echo "   - Ctrl+b ثم \" : تقسيم أفقي، Ctrl+b ثم % : تقسيم عمودي"
        echo "⚡ مدة التشغيل: 5 ساعات و55 دقيقة، ثم راحة 5 دقائق (جدولة مثالية)"
        echo "📉 توفير البيانات ≈ 99.9% مقارنة بالنسخة الرسومية"

        for i in $(seq 1 71); do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] Terminal active - $(($i * 5)) minutes"
          sleep 300
        done

        echo "🛑 انتهت المدة. تنظيف الموارد..."
        docker stop kali-terminal || true
        docker rm kali-terminal || true
        pkill -f "ssh.*serveo.net" || true
        echo "✅ تم التنظيف. سيبدأ الجوب التالي بعد 5 دقائق بالضبط."
