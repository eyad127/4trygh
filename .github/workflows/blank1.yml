name: Kali-Linux-Web-Browser-Ultimate-Fixed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: تشغيل حاوية Kali Terminal (صلاحيات كاملة)
      run: |
        docker run -d \
          --name=kali-terminal \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 7681:7681 \
          -e TZ=Africa/Cairo \
          kalilinux/kali-rolling:latest \
          sleep infinity
        sleep 15

    - name: تثبيت أدوات Kali (headless) و ttyd
      run: |
        docker exec kali-terminal bash -c "apt-get update && apt-get install -y kali-linux-headless curl wget git net-tools nano && apt-get clean"
        docker exec kali-terminal bash -c "wget https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -O /usr/local/bin/ttyd && chmod +x /usr/local/bin/ttyd"

    - name: تشغيل ttyd على المنفذ 7681
      run: |
        docker exec -d kali-terminal bash -c "/usr/local/bin/ttyd --credential admin:kali --port 7681 --writable bash"
        sleep 5

    - name: إنشاء نفق عبر pinggy.io (بدون مفتاح)
      id: tunnel
      run: |
        echo "⏳ جاري إنشاء النفق إلى المنفذ 7681 عبر pinggy.io..."
        ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:7681 a.pinggy.io 2>&1 | tee pinggy.log &
        sleep 12
        TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9\-]*\.a\.pinggy\.io' pinggy.log | head -1)
        if [ -z "$TUNNEL_URL" ]; then
          TUNNEL_URL=$(grep -o 'http://[a-zA-Z0-9\-]*\.a\.pinggy\.io' pinggy.log | head -1)
        fi
        echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
        echo "🌐 رابط الوصول: $TUNNEL_URL"
        echo "🔐 بيانات الدخول: admin / kali"

    - name: الإبقاء على الخدمة 5 ساعات و 55 دقيقة
      run: |
        echo "✅ الحاوية تعمل بـ 4 CPUs, 12GB RAM, 6GB SHM, ALL capabilities"
        echo "🌐 النفق عبر pinggy.io نشط لمدة 5 ساعات و 55 دقيقة"
        for i in $(seq 1 71); do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] النفق نشط - $((i*5)) دقيقة"
          sleep 300
        done
        echo "🛑 انتهت المدة. جاري التنظيف..."

    - name: تنظيف الموارد
      if: always()
      run: |
        docker stop kali-terminal || true
        docker rm kali-terminal || true
        pkill -f "ssh.*pinggy.io" || true
        echo "✅ تم التنظيف. سيبدأ الجوب التالي بعد 5 دقائق."
