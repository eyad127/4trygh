name: Kali-Linux-Terminal-Ultimate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: تشغيل حاوية Kali (بدون واجهة رسومية)
      run: |
        docker run -d \
          --name=kali-terminal \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --memory="12g" \
          --cpus="4" \
          -e TZ=Africa/Cairo \
          linuxserver/kali-linux:latest
        sleep 45

    - name: تثبيت ttyd + tmux + أدوات Kali (بدون GUI)
      run: |
        docker exec kali-terminal bash -c "
          set -e
          apt update -y
          apt install -y --no-install-recommends \
            build-essential cmake git pkg-config \
            libwebsockets-dev libjson-c-dev libssl-dev \
            tmux screen curl wget
          cd /opt
          git clone --depth 1 https://github.com/tsl0922/ttyd.git
          cd ttyd && mkdir build && cd build
          cmake ..
          make -j\$(nproc)
          make install
          apt install -y kali-linux-headless
        "

    - name: إعداد tmux (جلسة متعددة النوافذ)
      run: |
        docker exec kali-terminal bash -c "
          tmux new-session -d -s main
          tmux new-window -t main
          tmux new-window -t main
          tmux new-window -t main
        "

