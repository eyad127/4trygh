name: Kali-Linux-Terminal-Ultimate-Fixed

on:
  workflow_dispatch:
  schedule:
    # 00:00 مصر = 21:00 UTC (اليوم السابق)
    - cron: '0 21 * * *'
    # 06:00 مصر = 03:00 UTC
    - cron: '0 3 * * *'
    # 12:00 مصر = 09:00 UTC
    - cron: '0 9 * * *'
    # 18:00 مصر = 15:00 UTC
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install autossh on runner
      run: sudo apt-get update && sudo apt-get install -y autossh

    - name: Run Kali Terminal Container (Max Resources)
      run: |
        docker run -d \
          --name=kali-terminal \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 2222:22 \
          -v /dev/shm:/dev/shm \
          kalilinux/kali-rolling:latest sleep infinity

        echo "⏳ انتظار بدء الحاوية..."
        sleep 15

        echo "📦 تثبيت أدوات كالي كاملة + SSH + tmux (لجلسات متعددة)..."
        docker exec kali-terminal apt-get update -y
        docker exec kali-terminal apt-get install -y openssh-server sudo kali-linux-headless tmux screen
        docker exec kali-terminal bash -c "echo 'root:root' | chpasswd"
        docker exec kali-terminal bash -c "sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config"
        docker exec kali-terminal bash -c "sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config"
        docker exec kali-terminal service ssh start

        echo "✅ حاوية كالي Terminal بالموارد العالية (12GB RAM, 4 CPUs, 6GB SHM)"
        echo "🔧 لفتح عدة تباري: استخدم 'tmux' أو 'screen' بعد الاتصال"

