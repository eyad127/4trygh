name: Kali-Linux-Terminal-Ultimate

on:
  workflow_dispatch:
  schedule:
    # 00:00 مصر = 21:00 UTC
    - cron: '0 21 * * *'
    # 06:00 مصر = 03:00 UTC
    - cron: '0 3 * * *'
    # 12:00 مصر = 09:00 UTC
    - cron: '0 9 * * *'
    # 18:00 مصر = 15:00 UTC
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Run Headless Kali (Full Capabilities, No GUI)
      run: |
        docker run -d \
          --name=kali-terminal \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="2g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -e TZ=Africa/Cairo \
          linuxserver/kali-linux:latest
        sleep 30

    - name: Install ttyd, tmux & Core Kali Tools
      run: |
        docker exec kali-terminal apt update -y
        docker exec kali-terminal apt install -y ttyd tmux screen
        # تثبيت مجموعة الأدوات الشائعة في كالي (اختياري – يمكنك إضافة أي حزمة)
        docker exec kali-terminal apt install -y nmap sqlmap john hydra metasploit-framework wireshark-common netcat curl wget git python3 python3-pip

    - name: Start Web Terminal with tmux (Multi‑session support)
      run: |
        # إعداد tmux بحيث يبدأ بجلسة رئيسية إذا لم تكن موجودة
        docker exec kali-terminal bash -c "tmux new -s main -d || true"
        # تشغيل ttyd على المنفذ 8080 مع صلاحية الكتابة واسم مستخدم/كلمة مرور
        docker exec -d kali-terminal ttyd -p 8080 --writable --credential kali:password bash -c "tmux attach -t main || tmux new -s main"

