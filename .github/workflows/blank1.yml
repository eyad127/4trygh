name: Kali-Web-Terminal-Ultimate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies on runner
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Run Kali container with maximum resources
        run: |
          docker run -d \
            --name=kali-web \
            --hostname=kali \
            --cap-add=ALL \
            --security-opt seccomp=unconfined \
            --shm-size="6g" \
            --memory="12g" \
            --memory-swap="12g" \
            --memory-reservation="10g" \
            --cpus="4" \
            --pids-limit=-1 \
            -p 8080:8080 \
            -v /dev/shm:/dev/shm \
            kalilinux/kali-rolling:latest sleep infinity
          sleep 15

      - name: Install Kali tools + Web terminal (Wetty)
        run: |
          # تثبيت الأدوات الأساسية والكاملة لكالي
          docker exec kali-web apt-get update -y
          docker exec kali-web apt-get install -y kali-linux-headless tmux screen sudo wget

          # تثبيت Node.js (مطلوب لـ Wetty)
          docker exec kali-web apt-get install -y curl
          docker exec kali-web curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          docker exec kali-web apt-get install -y nodejs

          # تثبيت Wetty (محطة ويب تفاعلية)
          docker exec kali-web npm install -g wetty

          # إعداد كلمة مرور للمستخدم root (للدخول إلى الويب تيرمينال)
          docker exec kali-web bash -c "echo 'root:root' | chpasswd"

          # تشغيل Wetty على المنفذ 8080، بدون SSL (لأن Serveo سيتولى HTTPS)
          docker exec -d kali-web wetty --port 8080 --auth root:root --command bash

          echo "✅ Wetty terminal ready on port 8080"

