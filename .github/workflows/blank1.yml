        echo "📌 يمكنك فتح عدة جلسات اتصال متزامنة من أجهزة مختلفة أو من نفس الجهاز"

    - name: Keep Alive for 5 Hours and 55 Minutes (then 5 min break)
      run: |
        echo "✅ الحاوية تعمل بالموارد الأصلية: 4 CPUs, 12GB RAM, 6GB SHM, ALL capabilities"
        echo "🌐 النفق (SSH) نشط لمدة 5 ساعات و 55 دقيقة على المنفذ 8022"
        echo "⏳ سيتم التنظيف ثم راحة 5 دقائق قبل الجوب التالي"

        for i in $(seq 1 71); do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] النفق نشط - $(($i * 5)) دقيقة"
          sleep 300
        done

        echo "🛑 انتهت مدة التشغيل. تنظيف الموارد..."
        docker stop kali-terminal || true
        docker rm kali-terminal || true
        pkill -f "autossh.*serveo.net" || true
        pkill -f "ssh.*serveo.net" || true
        echo "✅ تم التنظيف. سيبدأ الجوب التالي بعد 5 دقائق (راحة)."
