name: Kali-Linux-Web-Browser-Ultimate-Fixed

on:
  workflow_dispatch:
  schedule:
    # 00:00 مصر = 21:00 UTC (اليوم السابق)
    - cron: '0 21 * * *'
    # 06:00 مصر = 03:00 UTC
    - cron: '0 3 * * *'
    # 12:00 مصر = 09:00 UTC
    - cron: '0 9 * * *'
    # 18:00 مصر = 15:00 UTC
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # لمنع القطع المبكر
    steps:
    - name: Run Kali Terminal Container (MAX Capabilities)
      run: |
        docker run -d \
          --name=kali-terminal \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 7681:7681 \
          -e TZ=Africa/Cairo \
          kalilinux/kali-rolling:latest \
          sleep infinity
        sleep 15

    - name: Install Kali Headless Tools and ttyd
      run: |
        docker exec kali-terminal bash -c "apt-get update && apt-get install -y kali-linux-headless curl wget git net-tools nano && apt-get clean"
        docker exec kali-terminal bash -c "wget https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -O /usr/local/bin/ttyd && chmod +x /usr/local/bin/ttyd"

    - name: Start ttyd Web Terminal
      run: |
        docker exec -d kali-terminal bash -c "/usr/local/bin/ttyd --credential admin:kali --port 7681 --writable bash"
        sleep 5

    - name: Create localhost.run Tunnel (no key needed)
      run: |
        echo "🌐 Creating tunnel to port 7681..."
        ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:7681 localhost.run 2>&1 | tee tunnel.log &
        sleep 10
        TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9\-]*\.lhr\.life' tunnel.log | head -1)
        echo "✅ Terminal available at: $TUNNEL_URL"
        echo "🔐 Credentials: admin / kali"
        echo "$TUNNEL_URL" > tunnel_url.txt

    - name: Keep Alive for 5 Hours and 55 Minutes (then 5 min break)
      run: |
        echo "✅ Container running with: 4 CPUs, 12GB RAM, 6GB SHM, ALL capabilities"
        echo "🌐 Tunnel active for 5 hours 55 minutes"
        for i in $(seq 1 71); do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] Tunnel active - $(($i * 5)) minutes"
          sleep 300
        done
        echo "🛑 Time finished. Cleaning up..."

    - name: Cleanup
      if: always()
      run: |
        docker stop kali-terminal || true
        docker rm kali-terminal || true
        pkill -f "ssh.*localhost.run" || true
        echo "✅ Cleanup done. Next job will start after 5 minutes."
