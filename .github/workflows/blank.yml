    # الخطوة 5: التشغيل المتواصل لمدة 5 ساعات مع الحفظ التلقائي كل 30 دقيقة
    - name: Keep Alive for 5 Hours + Periodic Save
      run: |
        echo "✅ الحاوية تعمل بأقصى إمكانيات:"
        echo "   - 4 CPUs | 12GB RAM | 6GB SHM | ALL capabilities"
        echo "🌐 النفق نشط بنفس الرابط: http://ahmed1258842255844595568llllkjjn-server.serveo.net"
        echo "💾 سيتم حفظ الجلسة تلقائياً كل 30 دقيقة"
        echo "📁 جميع ملفاتك وإعداداتك محفوظة في /tmp/kali_persist"
        echo "🔄 عند إعادة التشغيل، سيتم استعادة كل شيء تلقائياً"
        echo ""
        echo "⏰ الجدول الزمني: يعمل 5 ساعات، يفصل 5 دقائق، يعمل 5 ساعات..."
        
        # حفظ الجلسة الأولى
        docker exec kali-desktop /usr/local/bin/save-session
        
        # حلقة التشغيل: 5 ساعات = 300 دقيقة = 60 دورة × 5 دقائق
        for i in $(seq 1 60); do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] النفق نشط - $(($i * 5)) دقيقة"
          
          # كل 30 دقيقة (أي كل 6 دورات) نحفظ الجلسة تلقائياً
          if [ $((i % 6)) -eq 0 ]; then
            echo "💾 حفظ الجلسة تلقائياً..."
            docker exec kali-desktop /usr/local/bin/save-session || true
          fi
          
          sleep 300  # 5 دقائق
        done
        
        # حفظ الجلسة النهائية قبل الإغلاق
        echo "💾 حفظ الجلسة النهائية..."
        docker exec kali-desktop /usr/local/bin/save-session
        
        echo "🛑 انتهت الـ 5 ساعات. تنظيف الموارد..."
        docker stop kali-desktop || true
        docker rm kali-desktop || true
        pkill -f "ssh.*serveo.net" || true
        echo "✅ تم التنظيف. الجلسة القادمة ستبدأ بعد 5 دقائق - جميع ملفاتك وإعداداتك محفوظة"
