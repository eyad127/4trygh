name: Show Current Time

on:
  workflow_dispatch:
  schedule:
    # اختياري: يمكنك جدولة هذا الـ workflow لتشغيله كل دقيقة لمراقبة التوقيت
    - cron: '* * * * *'

jobs:
  check-time:
    runs-on: ubuntu-latest
    steps:
      - name: Display Current Time (UTC and Cairo)
        run: |
          echo "========== ⏰ TIME ZONE INFO =========="
          echo "🌍 UTC Time: $(date -u)"
          echo "🇪🇬 Cairo Time (UTC+2/3): $(TZ=Africa/Cairo date)"
          echo "🕒 Local Runner Time (system default): $(date)"
          echo "======================================"
          
