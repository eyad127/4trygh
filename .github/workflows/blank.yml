name: Kali-Linux-Web-Browser-Ultimate-Fixed

on:
  workflow_dispatch:
  schedule:
    # الجدول التالي يحقق نمط 5 ساعات عمل + 5 دقائق فصل
    # يعمل في الأوقات التالية بتوقيت القاهرة: 01:00, 06:05, 11:10, 16:15, 21:20, 02:25
    - cron: '0 22 * * *'   # 01:00 القاهرة = 22:00 UTC
    - cron: '5 3 * * *'    # 06:05 القاهرة = 03:05 UTC
    - cron: '10 8 * * *'   # 11:10 القاهرة = 08:10 UTC
    - cron: '15 13 * * *'  # 16:15 القاهرة = 13:15 UTC
    - cron: '20 18 * * *'  # 21:20 القاهرة = 18:20 UTC
    - cron: '25 23 * * *'  # 02:25 القاهرة = 23:25 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
    # الخطوة 1: تشغيل الحاوية بأقصى إمكانيات + التخزين الدائم لكل شيء
    - name: Run Kali Container (MAX Power + Persistent Storage)
      run: |
        # إنشاء مجلدات التخزين الدائم للمستخدم والجذر والإعدادات
        mkdir -p /tmp/kali_persist
        mkdir -p /tmp/kali_persist/home
        mkdir -p /tmp/kali_persist/root
        mkdir -p /tmp/kali_persist/config
        mkdir -p /tmp/kali_persist/chrome-data   # لحفظ بيانات Chrome بالكامل
        
        docker run -d \
          --name=kali-desktop \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 3000:3000 \
          -p 5900:5900 \
          -e PUID=0 \
          -e PGID=0 \
          -e TZ=Africa/Cairo \
          -e VNC_PR_PASSWORD=password \
          -e DISPLAY=:99 \
          -v /tmp/kali_persist/home:/home/abc \
          -v /tmp/kali_persist/root:/root \
          -v /tmp/kali_persist/config:/config \
          -v /tmp/kali_persist/chrome-data:/chrome-data \
          -v /dev/shm:/dev/shm \
          linuxserver/kali-linux:latest
        sleep 45

    # الخطوة 2: إعداد نظام الحفظ التلقائي للجلسة داخل الحاوية
    - name: Setup Session Persistence System
      run: |
        # تثبيت tmux و screen داخل الحاوية (أدوات إدارة الجلسات)
        docker exec kali-desktop apt update -y
        docker exec kali-desktop apt install -y tmux screen
        
        # إنشاء سكريبت الحفظ التلقائي للجلسة
        docker exec kali-desktop bash -c "cat > /usr/local/bin/save-session << 'EOF'
        #!/bin/bash
        echo '💾 حفظ الجلسة...'
        
        # حفظ تاريخ الأوامر (shell history)
        if [ -f /root/.bash_history ]; then
          cp /root/.bash_history /config/root_bash_history
        fi
        if [ -f /home/abc/.bash_history ]; then
          cp /home/abc/.bash_history /config/abc_bash_history
        fi
        
        # حفظ جلسات tmux النشطة
        if command -v tmux &> /dev/null; then
          tmux list-sessions 2>/dev/null | while read session; do
            session_name=\$(echo \$session | cut -d':' -f1)
            tmux capture-pane -t \$session_name -pS - > /config/tmux-session-\$session_name.log
          done
          echo 'tmux sessions saved' >> /config/last_save.log
        fi
        
        # حفظ علامات التبويب المفتوحة في المتصفح عبر حفظ السلة والجلسة
        # سيتم تفعيلها بعد تثبيت Chrome وضبطه
        echo 'Session saved at \$(date)' >> /config/last_save.log
        echo '✅ تم حفظ الجلسة'
        EOF"
        
        docker exec kali-desktop chmod +x /usr/local/bin/save-session
        
        # سكريبت استرجاع الجلسة المحفوظة
        docker exec kali-desktop bash -c "cat > /usr/local/bin/restore-session << 'EOF'
        #!/bin/bash
        echo '🔄 استعادة الجلسة المحفوظة...'
        
        # استرجاع تاريخ الأوامر
        if [ -f /config/root_bash_history ]; then
          cp /config/root_bash_history /root/.bash_history
          echo '✅ تم استعادة root history'
        fi
        if [ -f /config/abc_bash_history ]; then
          cp /config/abc_bash_history /home/abc/.bash_history
          chown abc:abc /home/abc/.bash_history
          echo '✅ تم استعادة abc history'
        fi
        
        # عرض آخر جلسة حفظ
        if [ -f /config/last_save.log ]; then
          echo '📋 آخر جلسة حفظ كانت في:'
          tail -1 /config/last_save.log
        fi
        
        # عرض جلسات tmux المحفوظة (إن وجدت)
        ls -la /config/tmux-*.log 2>/dev/null && echo '✅ توجد جلسات tmux محفوظة يمكن استعادتها'
        
        echo '✅ تم استعادة الإعدادات والملفات'
        EOF"
        
        docker exec kali-desktop chmod +x /usr/local/bin/restore-session
        
        # تنفيذ الاستعادة فور بدء الحاوية
        docker exec kali-desktop /usr/local/bin/restore-session

    # الخطوة 3: إعداد متصفح Chrome مع إعادة الفتح التلقائي للجلسة
    - name: Setup Chrome for Auto Session Restore
      run: |
        # تثبيت Google Chrome داخل الحاوية
        docker exec kali-desktop bash -c "wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -"
        docker exec kali-desktop bash -c "echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' >> /etc/apt/sources.list.d/google-chrome.list"
        docker exec kali-desktop apt update -y
        docker exec kali-desktop apt install -y google-chrome-stable
        
        # إنشاء سكريبت لتشغيل Chrome مع تفعيل استعادة الجلسة تلقائياً
        docker exec kali-desktop bash -c "cat > /usr/local/bin/start-chrome << 'EOF'
        #!/bin/bash
        # استخدام مجلد ثابت لحفظ بيانات Chrome خارج الحاوية
        mkdir -p /chrome-data
        # تشغيل Chrome مع إعداد استعادة الجلسة التلقائية
        google-chrome --user-data-dir=/chrome-data \
                      --restore-last-session \
                      --no-sandbox \
                      --disable-dev-shm-usage \
                      --display=:99 &
        EOF"
        
        docker exec kali-desktop chmod +x /usr/local/bin/start-chrome
        
        # بدء Chrome في الخلفية
        docker exec kali-desktop /usr/local/bin/start-chrome

