
name: Test-Schedule-Timing

on:
  workflow_dispatch:  # عشان تشغله يدوي كمان
  schedule:
    # هيشتغل كل دقيقة (لأغراض الاختبار بس)
    - cron: '* * * * *'
      timezone: 'Africa/Cairo'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Print Current Time
        run: |
          echo "✅ اختبار الجدولة شغال!"
          echo "🕐 الوقت الحالي بتوقيت القاهرة: $(date)"
          echo "🕐 الوقت بتوقيت UTC: $(date -u)"
          echo "📅 التاريخ الكامل: $(date '+%Y-%m-%d %H:%M:%S %Z')"
