name: Kali-Linux-Desktop

on:
  workflow_dispatch:
  schedule:
    # 00:00 مصر = 21:00 UTC (اليوم السابق)
    - cron: '0 21 * * *'
    # 06:00 مصر = 03:00 UTC
    - cron: '0 3 * * *'
    # 12:00 مصر = 09:00 UTC
    - cron: '0 9 * * *'
    # 18:00 مصر = 15:00 UTC
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: تشغيل حاوية Kali (سطح مكتب كامل)
      run: |
        docker run -d \
          --name=kali-desktop \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 3000:3000 \
          -p 5900:5900 \
          -e PUID=0 \
          -e PGID=0 \
          -e TZ=Africa/Cairo \
          -e VNC_PR_PASSWORD=password \
          -e DISPLAY=:99 \
          -v /dev/shm:/dev/shm \
          linuxserver/kali-linux:latest
        sleep 45

    - name: تنزيل أداة Cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
        chmod +x cloudflared

    - name: إنشاء نفق TryCloudflare (رابط عام ومجاني)
      run: |
        echo "⏳ جاري إنشاء النفق إلى المنفذ 3000 عبر TryCloudflare..."
        ./cloudflared tunnel --url http://localhost:3000 2>&1 | tee cloudflared.log &
        sleep 15
        TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
        echo "🌐 رابط الوصول (بيئة رسومية كاملة): $TUNNEL_URL"
        echo "🔐 كلمة مرور VNC (للوصول إلى سطح المكتب): password"

    - name: الإبقاء على الخدمة 5 ساعات و 55 دقيقة
      run: |
        echo "✅ الحاوية تعمل: 4 CPUs, 12GB RAM, ALL capabilities"
        for i in {1..71}; do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] النفق نشط - $((i*5)) دقيقة"
          sleep 300
        done

    - name: تنظيف الموارد
      if: always()
      run: |
        docker stop kali-desktop || true
        docker rm kali-desktop || true
        pkill -f cloudflared || true
        echo "✅ تم التنظيف."
