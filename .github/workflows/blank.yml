name: Kali-Linux-Web-Browser-Ultimate-Fixed

on:
  workflow_dispatch:
  schedule:
    # 00:00 مصر = 21:00 UTC (اليوم السابق)
    - cron: '0 21 * * *'
    # 06:00 مصر = 03:00 UTC
    - cron: '0 3 * * *'
    # 12:00 مصر = 09:00 UTC
    - cron: '0 9 * * *'
    # 18:00 مصر = 15:00 UTC
    - cron: '0 15 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Run Kali Container (MAX Capabilities)
      run: |
        docker run -d \
          --name=kali-desktop \
          --hostname=kali \
          --cap-add=ALL \
          --security-opt seccomp=unconfined \
          --shm-size="6g" \
          --memory="12g" \
          --memory-swap="12g" \
          --memory-reservation="10g" \
          --cpus="4" \
          --pids-limit=-1 \
          -p 3000:3000 \
          -p 5900:5900 \
          -e PUID=0 \
          -e PGID=0 \
          -e TZ=Africa/Cairo \
          -e VNC_PR_PASSWORD=password \
          -e DISPLAY=:99 \
          -v /dev/shm:/dev/shm \
          linuxserver/kali-linux:latest
        sleep 45

    - name: Create pinggy.io Tunnel (no SSH key required)
      run: |
        echo "⏳ Creating tunnel to port 3000 via pinggy.io..."
        ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:3000 a.pinggy.io 2>&1 | tee pinggy.log &
        sleep 12
        TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9\-]*\.a\.pinggy\.io' pinggy.log | head -1)
        if [ -z "$TUNNEL_URL" ]; then
          TUNNEL_URL=$(grep -o 'http://[a-zA-Z0-9\-]*\.a\.pinggy\.io' pinggy.log | head -1)
        fi
        echo "🌐 GUI Access URL: $TUNNEL_URL"
        echo "🔐 VNC Password: password (if asked)"
        echo "✅ Tunnel is active. Open the URL in your browser."

    - name: Keep Alive for 5 Hours and 55 Minutes (then 5 min break)
      run: |
        echo "✅ الحاوية تعمل بأقصى إمكانيات: 4 CPUs, 12GB RAM, 6GB SHM, ALL capabilities"
        echo "🌐 النفق عبر pinggy.io نشط لمدة 5 ساعات و 55 دقيقة"
        echo "⏳ سيتم التنظيف ثم راحة 5 دقائق قبل الجوب التالي (فارق 6 ساعات بين البدءين)"

        for i in $(seq 1 71); do
          echo "[$(TZ=Africa/Cairo date '+%H:%M:%S')] النفق نشط - $(($i * 5)) دقيقة"
          sleep 300
        done

        echo "🛑 انتهت مدة التشغيل. تنظيف الموارد..."
        docker stop kali-desktop || true
        docker rm kali-desktop || true
        pkill -f "ssh.*pinggy.io" || true
        echo "✅ تم التنظيف. سيبدأ الجوب التالي بعد 5 دقائق (راحة)."
